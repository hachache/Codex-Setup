name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to release, for example v1.0.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve tag
        id: tag
        shell: bash
        env:
          DISPATCH_TAG: ${{ inputs.tag }}
        run: |
          if [[ "$GITHUB_EVENT_NAME" == "workflow_dispatch" ]]; then
            tag="$DISPATCH_TAG"
          else
            tag="${GITHUB_REF_NAME}"
          fi

          if [[ ! "$tag" =~ ^v[0-9]+(\.[0-9]+){2}([-+][0-9A-Za-z.-]+)?$ ]]; then
            printf 'Invalid release tag: %s\n' "$tag" >&2
            exit 1
          fi

          git checkout --detach "$tag"
          printf 'tag=%s\n' "$tag" >> "$GITHUB_OUTPUT"

      - name: Validate setup
        run: ./scripts/validate.sh

      - name: Isolated install and doctor
        shell: bash
        run: |
          tmp_home="$(mktemp -d)"
          CODEX_HOME="$tmp_home/.codex" ./install.sh --install-config
          CODEX_HOME="$tmp_home/.codex" ./scripts/doctor.sh

      - name: Build archive
        id: archive
        shell: bash
        env:
          RELEASE_TAG: ${{ steps.tag.outputs.tag }}
        run: |
          tag="$RELEASE_TAG"
          if [[ ! "$tag" =~ ^v[0-9]+(\.[0-9]+){2}([-+][0-9A-Za-z.-]+)?$ ]]; then
            printf 'Invalid release tag: %s\n' "$tag" >&2
            exit 1
          fi

          archive="Codex-Setup-${tag}.tar.gz"
          git archive --format=tar.gz --prefix="Codex-Setup-${tag}/" -o "$archive" HEAD
          sha256sum "$archive" > "$archive.sha256"
          printf 'archive=%s\n' "$archive" >> "$GITHUB_OUTPUT"

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps.tag.outputs.tag }}
          RELEASE_ARCHIVE: ${{ steps.archive.outputs.archive }}
        shell: bash
        run: |
          tag="$RELEASE_TAG"
          archive="$RELEASE_ARCHIVE"
          if [[ ! "$tag" =~ ^v[0-9]+(\.[0-9]+){2}([-+][0-9A-Za-z.-]+)?$ ]]; then
            printf 'Invalid release tag: %s\n' "$tag" >&2
            exit 1
          fi

          gh release create "$tag" "$archive" "$archive.sha256" --verify-tag --generate-notes
